name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        # The two combos the determinism contract records as byte-verified:
        # vectors generated on CPython 3.14/macOS, re-verified on 3.11/ubuntu.
        python-version: ["3.11", "3.14"]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[dev]"
      - run: pytest
      # Redundant with tests/test_golden_vectors.py, but makes the byte-level
      # cross-platform verification visible as its own CI step.
      - run: python scripts/verify_golden.py
