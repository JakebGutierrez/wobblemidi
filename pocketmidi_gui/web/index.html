<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>pocketmidi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<div id="unit">

  <header id="brandplate">
    <div class="brand-left">
      <span class="wordmark">pocketmidi</span>
      <span class="model-badge">PM-01</span>
    </div>
    <div class="brand-right">
      <div class="brand-lines">
        <span class="tagline">RHYTHM HUMANISER</span>
        <span class="subline">REAL DRUMMER DATA &middot; FULLY OFFLINE</span>
      </div>
      <div class="led-block">
        <div id="power-led" class="led"></div>
        <span class="led-label">POWER</span>
      </div>
    </div>
  </header>

  <section id="screen-bezel">
    <div id="screen-wrap">
      <canvas id="groove-screen"></canvas>
      <div id="screen-empty" class="screen-overlay visible">NO PATTERN LOADED &mdash; PRESS LOAD</div>
    </div>
    <div id="minimap-wrap">
      <canvas id="minimap"></canvas>
    </div>
  </section>

  <section id="controls">
    <div id="knobs">
      <div class="knob-mount big" id="knob-intensity">
        <div class="knob"><div class="knob-cap"></div><div class="knob-pointer"></div></div>
        <span class="ctl-label">INTENSITY</span>
        <span class="ctl-value" id="val-intensity">0.35</span>
      </div>
      <div class="knob-mount" id="knob-tightness">
        <div class="knob"><div class="knob-cap"></div><div class="knob-pointer"></div></div>
        <span class="ctl-label">TIGHTNESS</span>
        <span class="ctl-value" id="val-tightness">0.40</span>
      </div>
      <div class="toggle-mount" id="toggle-push">
        <div class="toggle"><div class="toggle-lever"></div></div>
        <span class="ctl-label">PUSH</span>
        <span class="ctl-value" id="val-push">OFF</span>
      </div>
    </div>
    <div id="buttons">
      <button id="btn-load"     class="pad pad-red">LOAD</button>
      <button id="btn-humanise" class="pad pad-orange" disabled>HUMANISE</button>
      <button id="btn-play"     class="pad pad-yellow" disabled>PLAY</button>
      <button id="btn-ab"       class="pad pad-cream" disabled>A/B</button>
      <button id="btn-export"   class="pad pad-cream" disabled>EXPORT</button>
    </div>
  </section>

  <div id="toast"></div>
</div>

<script src="bridge.js"></script>
<script src="main.js"></script>
</body>
</html>
